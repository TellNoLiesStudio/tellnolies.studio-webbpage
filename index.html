<body>
    <div class="backgroundImage">

	<div class="menuBox">

			<div class="sideBySideButtons">

				<a href="#" class="button" onclick="showSection('NewsSection')">News Section</a>
			</div>
			
			<div class="socialMediaContainer">
                <a href="https://discord.com/invite/7M9KZndhWm" class="socialButton" target="_blank">
                    <img src="Images/discord-mark-white.png" alt="Button Image Default" class="default">
                    <img src="Images/discord-mark-black.png" alt="Button Image Hover" class="hover">
                </a>
				<a href="https://www.youtube.com/@TellNoLies_studio" class="socialButton" target="_blank">
					<img src="Images/yt_icon_white_digital.png" alt="YouTube Icon Default" class="default" style="transform: scale(1.4);">
					<img src="Images/yt_icon_red_digital.png" alt="YouTube Icon Hover" class="hover" style="transform: scale(1.4);">
				</a>
				<a href="#" class="socialButton" onclick="copyEmail()">
					<img src="Images/Mail-white.png" alt="Mail Icon Default" class="default" style="transform: scale(1.2);">
					<img src="Images/Mail-black.png" alt="Mail Icon Hover" class="hover"style="transform: scale(1.2);">

		<div class="showcase">

	<div id="menuToggle" class="menuToggleButton" onclick="showSection('StartSection')">☰</div>

        <div class="pictureBox">
            <div class="logoText"></div>
        </div>
    </div>

    <!-- Here is section two -->
    <div id="AboutUsSection" class="page-section">

    </div>
    <!-- Here is section three-->
    <div id="NewsSection" class="page-section">
        <div class="centerBox">
            <div class=" verticlaColumn" style="width: 30%;">
                <div class="mailBox"></div>
                <div class="discordBox">
					<div class="constructionIcon">
		<img src="Images/UnderConstruction.png" alt="Under Construction" style="width: 100px; height: 100px;">
	</div>
				</div>
            </div>
            <div class="verticlaColumn" style="width: 70%;">
                <div class="whideContentBox"></div>
                <div class="whideContentBox"></div>
            </div>
        </div>
    </div>

</body>

<script>
    document.addEventListener('mousemove', parallax);

    function parallax(e) {
        const layers = document.querySelectorAll('.backgroundImage .layer');
        layers.forEach(layer => {
            const speed = layer.getAttribute('data-speed');
            const x = (window.innerWidth / 2 - e.pageX) * speed / 100;
            const y = (window.innerHeight / 2 - e.pageY) * speed / 100;
            layer.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
        });
    }


    function showSection(sectionId) 
	{
		// Hide all page sections
		const sections = document.querySelectorAll('.page-section');
		sections.forEach(section => {
			section.style.display = 'none';
		});

		// Show the selected section
		const selectedSection = document.getElementById(sectionId);
		if (selectedSection) {
			selectedSection.style.display = 'flex';
		}

		const menu = document.querySelector('.menuBox');
		const toggle = document.getElementById('menuToggle');

		if (sectionId === 'StartSection') {
			// Show menu, hide toggle
			menu.classList.remove('hidden');
			toggle.style.display = 'none';
		} else {
			// Hide menu, show toggle
			menu.classList.add('hidden');
			toggle.style.display = 'flex';
		}
	}

	// Add click listener to toggle button
	document.getElementById('menuToggle').addEventListener('click', () => {
		const menu = document.querySelector('.menuBox');
		const toggle = document.getElementById('menuToggle');

		menu.classList.remove('hidden');  // Slide menu back in
		toggle.style.display = 'none';    // Hide toggle button
	});
	
	function copyEmail() {
    const email = "tellnolies.studio+contact@gmail.com";
    navigator.clipboard.writeText(email)
        .then(() => {
            alert("Email copied to clipboard!");
        })
        .catch(() => {
            alert("Failed to copy email. Please copy manually: " + email);
        });
}
	
	
</script>
</html>
